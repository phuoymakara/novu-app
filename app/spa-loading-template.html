<style>
  #dailyos-splash {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: #ffffff;
    z-index: 9999;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    #dailyos-splash { background: #09090b; }
    #dailyos-splash .app-name { color: #fafafa; }
    .splash-spinner { border-color: #27272a; border-top-color: #22c55e; }
  }
  .splash-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: splash-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .app-name {
    font-size: 22px;
    font-weight: 700;
    color: #1c1917;
    letter-spacing: -0.02em;
    animation: splash-pop 0.4s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .splash-spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #e7e5e4;
    border-top-color: #22c55e;
    border-radius: 50%;
    animation: splash-spin 0.75s linear infinite;
  }
  @keyframes splash-pop {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes splash-spin {
    to { transform: rotate(360deg); }
  }
</style>

<div id="dailyos-splash">
  <div class="splash-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
  </div>
  <div class="app-name">DailyOS</div>
  <div class="splash-spinner"></div>
</div>
